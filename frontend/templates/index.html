<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭园艺植物识别系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">YOLOv11 Plant Recognition</p>
      <h1>家庭园艺植物识别系统</h1>
      <p class="lead">上传植物图片，获取植物类别、病害检测结果和基础养护建议。</p>
      <div class="meta-strip">
        <span>项目目录：{{ project_root }}</span>
        <span id="mode-badge">推理模式读取中</span>
      </div>
    </section>

    <section class="panel">
      <form id="predict-form" class="upload-form">
        <label class="upload-box" for="image-input">
          <span>选择植物图片</span>
          <input id="image-input" name="file" type="file" accept=".jpg,.jpeg,.png" required>
        </label>
        <button type="submit">开始识别</button>
      </form>
      <p id="status" class="status">等待上传图片。</p>
    </section>

    <section class="content">
      <div class="card">
        <h2>图片预览</h2>
        <img id="preview-image" class="preview-image" alt="上传预览图">
      </div>

      <div class="card">
        <h2>识别结果</h2>
        <img id="result-image" class="preview-image" alt="识别结果图">
        <div id="result-list" class="result-list"></div>
      </div>
    </section>

    <section class="card labels-card">
      <h2>当前支持类别</h2>
      <div id="labels-list" class="labels-list"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
